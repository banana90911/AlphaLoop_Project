name: Phase0 - KIS 해외 IP 게이트

# 목적: GitHub Actions 러너(해외 IP)에서 KIS API가 호출되는지 확인한다.
#   통과 → GitHub Actions를 스케줄러로 채택
#   실패 → Oracle Cloud 무료(서울) / 집 맥미니로 호스팅 전환 (P0-1)
# 실행: 리포 Actions 탭 → 이 워크플로 선택 → "Run workflow" 버튼

on:
  workflow_dispatch:

jobs:
  kis-gate:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 러너 위치(IP/지역) 확인
        run: |
          echo "=== 이 러너의 공인 IP / 지역 ==="
          curl -s https://ipinfo.io | tee ipinfo.txt || true

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install requests python-dotenv

      - name: KIS 토큰·시세 게이트
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_PAPER_APP_KEY: ${{ secrets.KIS_PAPER_APP_KEY }}
          KIS_PAPER_APP_SECRET: ${{ secrets.KIS_PAPER_APP_SECRET }}
          KIS_PAPER_ACCOUNT_NO: ${{ secrets.KIS_PAPER_ACCOUNT_NO }}
        run: python scripts/smoke_test.py kis
