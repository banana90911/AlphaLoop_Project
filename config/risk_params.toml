# 리스크·사이징·청산 파라미터 (튜닝 손잡이). 초기값은 직관에서 출발 → 백테스트 OOS 워크포워드로 확정.
# 조정 파라미터 7개 이하 제약(04-data 4.x). 상세 근거는 docs/05-risk-trading.md 5-2.

[limits]
daily_loss_pct = 0.04        # 일일 -4% 서킷브레이커 (05-risk 5-1 A: 실현+미실현 MTM·당일시작자본 대비)
max_positions = 5            # 동시 보유 종목 수 상한
per_name_pct = 0.13          # 종목당 유도 한도(≈13%, 5-1 A: 하한가 갭에도 일일바닥 단독 미돌파; 사이징 권장선)
per_name_hard_pct = 0.25     # 종목당 하드 상한(절대 차단, 유도 per_name_pct와 별개 — 05-risk A.1·A.3)
sector_pct = 0.30            # 섹터 집중 하드 한도 (05-risk 5-1 A.1·5-1 상관 페널티)
gross_exposure_max = 1.0     # 총노출 상한(레버리지 금지 — 05-risk A.1)
adv_participation = 0.01     # 유동성 한도: 일평균거래대금(ADV)의 1%

[circuit_breaker]
drawdown_halt_pct = 0.20     # 고점 대비 누적 낙폭 정지(시작값, 백테스트 튜닝 — 05-risk 5-1·A.2)

[anomaly]
# 모델 이상행동 → SafeStop 임계 (05-risk A.3, 전부 튜닝 출발값)
single_order_pct = 0.30          # 단일 주문 노출이 자본의 이 비율 초과 시 SafeStop
max_new_orders_per_capital = 5   # 신규 진입 주문 수 임계(기준 자본액당)
order_count_capital_base = 10_000_000  # 위 기준 자본(원): 1,000만원당 5건

[decision]
# B안(code_decider) 종합점수 가중·임계 (10-3.1 B, 워크포워드 확정). C와 차이는 결정 주체뿐.
w_screen = 0.6               # 스크리너 점수 가중
w_catalyst = 0.4             # 촉매(뉴스) 점수 가중
w_calibration = 0.0          # 보정신뢰 가중(calibration 미구현 → 0, 구현 후 상향)
entry_threshold = 0.60       # 신규 진입 종합점수 임계 τ
exit_threshold = 0.40        # 보유 논지무효 임계(촉매·점수 이 아래로 떨어지면 청산)
dissent_min = 0.60           # C안 결정자: 반대시나리오 반영도 이 미만이면 강제 무거래(P1-2)

[retrieval]
# 인출 스코어러 가중 (07 7.18·7.21, 워크포워드 확정). 초기 휴면 — lessons 0건이면 raw 매칭.
w_regime = 0.35              # 레짐 유사도(오늘과 닮은 시장 국면)
w_sector = 0.20             # 섹터/종목 정합
w_setup = 0.20              # 셋업 정합
w_recency = 0.15            # 최근성(시간 가중)
w_calib = 0.10              # 보정신뢰
half_life_days = 180         # 최근성 반감기
top_k = 5                    # 인출 상위 건수

[portfolio]
# 포트폴리오 배분 (05-risk 5-2, 전부 시작값 — 14장서 자금 확정 후 백테스트로 확정)
max_per_sector = 2               # 한 섹터 동시 보유 종목 수 상한(섹터당 30% 한도와 별개)
min_exposure = 0.2               # 레짐 최악 시 최소 총노출(나머지 현금)
rotation_margin = 0.1            # 교체매매: 신규 엣지가 최약체보다 이만큼 더 커야 채택
# 자본 구간별 목표 보유 종목 수 [자본 상한(원), 목표 수] — 미만이면 그 목표 적용
position_tiers = [[30_000_000, 4], [50_000_000, 5], [100_000_000, 8]]
position_tiers_max = 10          # 위 구간 모두 초과(1억+) 시 목표 수

[sizing]
# 변동성 타깃팅(메인) — 거래당 위험 비율. conviction 0→min, 1→max (05-risk 5-2 §119)
risk_pct_min = 0.0075
risk_pct_max = 0.025
# 프랙셔널 켈리(자동활성 상한)
kelly_fraction = 0.5         # 켈리 분수 배율 k (0.25~0.5)
kelly_min_trades = 20        # 켈리 활성 최소 청산 n (그 전 휴면, 상한 없음)

[conviction]
# conviction 가중합(합 1.0). w_confidence는 LLM 자기신고라 작게 시작(05-risk 5-2 §117).
w_confidence = 0.2           # 확신도(자기신고, 수축 안 걸림)
w_calibration = 0.4         # 보정신뢰(calibration 뷰, 수축 적용 — 실측 적중에 무게)
w_contrarian = 0.2          # 반대의견 반영
w_thesis = 0.2              # 논지 품질(entry_thesis 충실도)

[entry]
stop_atr_k = 2.0            # 진입 초기 손절폭 = stop_atr_k × ATR20 (R 산정 기준, 백테스트 확정)
score_min = 0.55           # 신규 진입 최소 스크리너 점수(0~1) — 약한 후보 무거래
# 워밍업은 momentum(60일) NaN으로 자동 처리(그 전엔 진입 안 함), 별도 일수 파라미터 불요

[exits]
tp1_R = 1.5                  # 1차 익절 R 배수 (시작값, 05-risk §98 — 1.5R·2R·3×ATR20 비교 확정)
tp1_frac = 0.4              # 1차 익절 비율 (1/3~1/2)
trail_k = 2.75             # ATR20 트레일링 배수 (2.5~3.0)
max_hold_days = 20         # 최대 보유 거래일
min_progress_R = 0.5       # 시간청산 면제 기준 진행 R

[screener]
# 스크리닝 가중치(합 1.0) — 시작값, 백테스트로 확정 (04-data 4.x)
w_momentum = 0.35
w_supply = 0.25
w_lowvol = 0.15
w_alignment = 0.10
w_value = 0.15
top_n = 40                   # 워치리스트 상위 N + 보유 전부
