# 리스크·사이징·청산 파라미터 (튜닝 손잡이). 초기값은 직관에서 출발 → 백테스트 OOS 워크포워드로 확정.
# 조정 파라미터 7개 이하 제약(04-data 4.x). 상세 근거는 docs/05-risk-trading.md 5-2.

[limits]
daily_loss_pct = 0.04        # 일일 -4% 서킷브레이커 (05-risk 5-1 A: 실현+미실현 MTM·당일시작자본 대비)
max_positions = 5            # 동시 보유 종목 수 상한
per_name_pct = 0.13          # 종목당 유도 한도(≈13%, 5-1 A: 하한가 갭에도 일일바닥 단독 미돌파)
adv_participation = 0.01     # 유동성 한도: 일평균거래대금(ADV)의 1%

[sizing]
# 변동성 타깃팅(메인) — 거래당 위험 비율. conviction 0→min, 1→max (05-risk 5-2 §119)
risk_pct_min = 0.0075
risk_pct_max = 0.025
# 프랙셔널 켈리(자동활성 상한)
kelly_fraction = 0.5         # 켈리 분수 배율 k (0.25~0.5)
kelly_min_trades = 20        # 켈리 활성 최소 청산 n (그 전 휴면, 상한 없음)

[conviction]
# conviction 가중합(합 1.0). w_confidence는 LLM 자기신고라 작게 시작(05-risk 5-2 §117).
w_confidence = 0.2           # 확신도(자기신고, 수축 안 걸림)
w_calibration = 0.4         # 보정신뢰(calibration 뷰, 수축 적용 — 실측 적중에 무게)
w_contrarian = 0.2          # 반대의견 반영
w_thesis = 0.2              # 논지 품질(entry_thesis 충실도)

[exits]
tp1_R = 1.5                  # 1차 익절 R 배수 (시작값, 05-risk §98 — 1.5R·2R·3×ATR20 비교 확정)
tp1_frac = 0.4              # 1차 익절 비율 (1/3~1/2)
trail_k = 2.75             # ATR20 트레일링 배수 (2.5~3.0)
max_hold_days = 20         # 최대 보유 거래일
min_progress_R = 0.5       # 시간청산 면제 기준 진행 R

[screener]
# 스크리닝 가중치(합 1.0) — 시작값, 백테스트로 확정 (04-data 4.x)
w_momentum = 0.35
w_supply = 0.25
w_lowvol = 0.15
w_alignment = 0.10
w_value = 0.15
top_n = 40                   # 워치리스트 상위 N + 보유 전부
